name: YourEmAIL Pipeline

on:
  push:
    branches: [main, api-gateway]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v5

      - name: Backend tests
        if: matrix.component == 'backend'
        run: |
          cd backend
          pip install -r requirements-dev.txt
          pytest -q

      - name: Frontend tests
        if: matrix.component == 'frontend'
        run: |
          cd frontend
          npm ci
          npm test

  sonarqube:
    name: SonarQube Quality Gate
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      sonarqube:
        image: sonarqube:community
        ports:
          - 9000:9000
        env:
          SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Wait for SonarQube
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:9000/api/system/status | grep -q UP; then
              echo "SonarQube UP"
              exit 0
            fi
            echo "Aguardando SonarQube..."
            sleep 10
          done
          exit 1

      - name: Bootstrap SonarQube token
        run: |
          TOKEN=$(curl -s -u admin:admin -X POST \
            "http://localhost:9000/api/user_tokens/generate?name=gha-${{ github.run_id }}" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('token',''))")
          if [ -z "$TOKEN" ]; then
            echo "Falha ao gerar token SonarQube"
            exit 1
          fi
          echo "SONAR_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9000

      - name: Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: http://localhost:9000

  sast:
    name: SAST (Trivy)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v5

      - name: Build API-1 image for scan
        run: |
          docker build -f infra/apis/api-1/Docker/Dockerfile -t youremail-api-1:scan .

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: youremail-api-1:scan
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library

  build-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: [sonarqube, sast]
    if: github.event_name == 'push'
    environment: deploy
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repositories
        run: |
          for repo in youremail-api-1 youremail-api-2; do
            aws ecr describe-repositories --repository-names "$repo" >/dev/null 2>&1 \
              || aws ecr create-repository --repository-name "$repo"
          done
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "IMAGE_API1=${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/youremail-api-1" >> "$GITHUB_ENV"
          echo "IMAGE_API2=${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/youremail-api-2" >> "$GITHUB_ENV"
          echo "ECR_REGISTRY=${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> "$GITHUB_ENV"

      - name: Build and push API-1
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/apis/api-1/Docker/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_API1 }}:${{ github.sha }}
            ${{ env.IMAGE_API1 }}:latest

      - name: Build and push API-2
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/apis/api-2/Docker/Dockerfile
          push: true
          build-args: |
            VITE_BACKEND_URL=
          tags: |
            ${{ env.IMAGE_API2 }}:${{ github.sha }}
            ${{ env.IMAGE_API2 }}:latest

  deploy-homolog:
    name: Deploy Homolog
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push'
    environment: deploy
    steps:
      - uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init -input=false -backend-config=backend.hcl

      - name: Terraform Validate
        working-directory: infra/terraform
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: terraform validate

      - name: Terraform Refresh
        working-directory: infra/terraform
        env:
          TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
        run: terraform refresh -input=false

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null

      - name: sync ansible
        id: inventory
        run: |
          GATEWAY_IP=$(terraform -chdir=infra/terraform output -raw gateway_public_ip)
          GATEWAY_PRIV=$(terraform -chdir=infra/terraform output -raw gateway_private_ip)
          API1_IP=$(terraform -chdir=infra/terraform output -raw api1_private_ip)
          CI_IP=$(terraform -chdir=infra/terraform output -raw ci_public_ip)
          RDS_EP=$(terraform -chdir=infra/terraform output -raw rds_endpoint)
          RDS_READ=$(terraform -chdir=infra/terraform output -raw rds_read_endpoint)
          SUBNETS=$(terraform -chdir=infra/terraform output -raw public_subnet_ids)
          ECR1=$(terraform -chdir=infra/terraform output -raw ecr_api1_url)
          ECR2=$(terraform -chdir=infra/terraform output -raw ecr_api2_url)
          ECR_REG=$(echo "$ECR1" | cut -d/ -f1)
          ECR_PASS=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})
          sed -e "s/GATEWAY_PUBLIC_IP/${GATEWAY_IP}/g" \
              -e "s/GATEWAY_PRIVATE_IP/${GATEWAY_PRIV}/g" \
              -e "s/API1_PRIVATE_IP/${API1_IP}/g" \
              -e "s/CI_PUBLIC_IP/${CI_IP}/g" \
              -e "s/RDS_ENDPOINT/${RDS_EP}/g" \
              -e "s/RDS_READ_ENDPOINT/${RDS_READ}/g" \
              -e "s/PUBLIC_SUBNET_IDS/${SUBNETS}/g" \
              -e "s|ECR_REGISTRY|${ECR_REG}|g" \
              -e "s|ECR_IMAGE_API1|${ECR1}|g" \
              -e "s|ECR_IMAGE_API2|${ECR2}|g" \
              infra/ansible/hosts.ini > /tmp/hosts.ini
          echo "gateway_url=http://${GATEWAY_IP}" >> "$GITHUB_OUTPUT"
          echo "ci_ip=${CI_IP}" >> "$GITHUB_OUTPUT"
          echo "ecr_password=${ECR_PASS}" >> "$GITHUB_OUTPUT"
          echo "ecr_registry=${ECR_REG}" >> "$GITHUB_OUTPUT"
          echo "ecr_image_api1=${ECR1}" >> "$GITHUB_OUTPUT"
          echo "ecr_image_api2=${ECR2}" >> "$GITHUB_OUTPUT"
          tar czf /tmp/infra-bundle.tgz -C infra ansible scripts gateway
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=120 -i ~/.ssh/deploy_key ec2-user@${CI_IP} \
            "sudo mkdir -p /opt/youremail && sudo chown ec2-user:ec2-user /opt/youremail"
          scp -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=120 -i ~/.ssh/deploy_key /tmp/infra-bundle.tgz /tmp/hosts.ini ec2-user@${CI_IP}:/opt/youremail/
          scp -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=120 -i ~/.ssh/deploy_key ~/.ssh/deploy_key ec2-user@${CI_IP}:/home/ec2-user/.ssh/deploy_key
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=120 -i ~/.ssh/deploy_key ec2-user@${CI_IP} \
            "mkdir -p /opt/youremail/ansible /home/ec2-user/.ssh && chmod 600 /home/ec2-user/.ssh/deploy_key && tar xzf /opt/youremail/infra-bundle.tgz -C /opt/youremail && mv /opt/youremail/hosts.ini /opt/youremail/ansible/hosts.ini"

      - name: deploy api1
        env:
          CI_IP: ${{ steps.inventory.outputs.ci_ip }}
          ECR_PASSWORD: ${{ steps.inventory.outputs.ecr_password }}
          ECR_REGISTRY: ${{ steps.inventory.outputs.ecr_registry }}
          ECR_IMAGE_API1: ${{ steps.inventory.outputs.ecr_image_api1 }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=120 -i ~/.ssh/deploy_key ec2-user@${CI_IP} << EOF
          export ECR_PASSWORD='${ECR_PASSWORD}'
          export ECR_REGISTRY='${ECR_REGISTRY}'
          export ECR_IMAGE_API1='${ECR_IMAGE_API1}'
          export IMAGE_TAG='${IMAGE_TAG}'
          cd /opt/youremail/ansible
          ansible-playbook -i hosts.ini playbooks/deploy-docker.yml \
            -e "gemini_api_key=${{ secrets.GEMINI_API_KEY }}" \
            -e "rds_password=${{ secrets.DB_PASSWORD }}"
          EOF

      - name: kubeconfig
        env:
          CI_IP: ${{ steps.inventory.outputs.ci_ip }}
        run: |
          CLUSTER=$(terraform -chdir=infra/terraform output -raw eks_cluster_name)
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=120 -i ~/.ssh/deploy_key ec2-user@${CI_IP} \
            "aws eks update-kubeconfig --name ${CLUSTER} --region ${{ env.AWS_REGION }}"

      - name: deploy k8s
        env:
          CI_IP: ${{ steps.inventory.outputs.ci_ip }}
          ECR_IMAGE_API2: ${{ steps.inventory.outputs.ecr_image_api2 }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          scp -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=120 -i ~/.ssh/deploy_key -r infra/kubernetes ec2-user@${CI_IP}:/opt/youremail/
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=120 -i ~/.ssh/deploy_key ec2-user@${CI_IP} << EOF
          export ECR_IMAGE_API2='${ECR_IMAGE_API2}'
          export IMAGE_TAG='${IMAGE_TAG}'
          cd /opt/youremail/ansible
          ansible-playbook -i hosts.ini playbooks/deploy-k8s.yml
          EOF

    outputs:
      gateway_url: ${{ steps.inventory.outputs.gateway_url }}

  dast:
    name: DAST OWASP ZAP Baseline
    runs-on: ubuntu-latest
    needs: deploy-homolog
    if: github.event_name == 'push'
    environment: deploy
    permissions:
      contents: read
    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ needs.deploy-homolog.outputs.gateway_url || secrets.GATEWAY_HOMOLOG_URL }}
          cmd_options: -a
          allow_issue_writing: false
          artifact_name: zap-scan-${{ github.run_id }}

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [unit-tests, sonarqube, sast, build-push, deploy-homolog, dast]
    if: always()
    steps:
      - name: summary
        run: |
          echo "unit-tests=${{ needs.unit-tests.result }}"
          echo "sonarqube=${{ needs.sonarqube.result }}"
          echo "sast=${{ needs.sast.result }}"
          echo "build-push=${{ needs.build-push.result }}"
          echo "deploy-homolog=${{ needs.deploy-homolog.result }}"
          echo "dast=${{ needs.dast.result }}"
          FAILED=0
          if [ "${{ needs.unit-tests.result }}" = "failure" ]; then FAILED=1; fi
          if [ "${{ needs.sonarqube.result }}" = "failure" ]; then FAILED=1; fi
          if [ "${{ needs.sast.result }}" = "failure" ]; then FAILED=1; fi
          if [ "${{ github.event_name }}" = "push" ]; then
            if [ "${{ needs.build-push.result }}" = "failure" ]; then FAILED=1; fi
            if [ "${{ needs.deploy-homolog.result }}" = "failure" ]; then FAILED=1; fi
            if [ "${{ needs.dast.result }}" = "failure" ]; then FAILED=1; fi
          fi
          exit $FAILED
