sonar.projectKey=youremail
sonar.projectName=YourEmAIL
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8

sonar.sources=backend,frontend/src
sonar.tests=backend/tests,frontend/src
sonar.test.inclusions=**/*test*.py,**/*test*.ts

sonar.python.version=3.12
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.exclusions=**/node_modules/**,**/dist/**,**/.venv/**,**/coverage/**,infra/**

sonar.coverage.exclusions=**/*test*.py,**/*test*.ts,frontend/src/main.tsx,frontend/src/index.tsx
