---
- name: deploy api1
  hosts: api1
  become: true
  vars_files:
    - ../group_vars/all.yml

  tasks:
    - name: docker package
      ansible.builtin.package:
        name: docker
        state: present
      when: ansible_os_family == "RedHat"

    - name: docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

    - name: ecr login
      community.docker.docker_login:
        registry_url: "{{ ecr_registry }}"
        username: AWS
        password: "{{ ecr_password }}"
      no_log: true
      when: ecr_password | length > 0

    - name: pull image
      community.docker.docker_image:
        name: "{{ ecr_image_api1 }}:{{ image_tag }}"
        source: pull
        force_source: true

    - name: config dir
      ansible.builtin.file:
        path: /opt/youremail
        state: directory
        mode: "0750"

    - name: env file
      ansible.builtin.copy:
        dest: /opt/youremail/api1.env
        mode: "0600"
        content: |
          PORT={{ api1_port | default(5000) }}
          DATABASE_URL={{ database_url }}
          GEMINI_API_KEY={{ gemini_api_key }}
          CORS_ALLOWED_ORIGINS={{ cors_allowed_origins }}
          FLASK_DEBUG=false

    - name: remove old container
      community.docker.docker_container:
        name: youremail-api-1
        state: absent
      ignore_errors: true

    - name: start container
      community.docker.docker_container:
        name: youremail-api-1
        image: "{{ ecr_image_api1 }}:{{ image_tag }}"
        state: started
        restart_policy: always
        env_file: /opt/youremail/api1.env
        published_ports:
          - "{{ api1_port | default(5000) }}:5000"
        healthcheck:
          test: ["CMD", "curl", "-f", "http://127.0.0.1:5000/"]
          interval: 30s
          timeout: 5s
          retries: 3
          start_period: 20s

    - name: health check
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ api1_port | default(5000) }}/"
        method: GET
        status_code: 200
      register: health
      retries: 10
      delay: 5
      until: health.status == 200
