apiVersion: v1
kind: Service
metadata:
  name: youremail-frontend
  namespace: youremail
  labels:
    app: youremail-frontend
  annotations:
    youremail.io/gateway: youremail-gateway
spec:
  type: NodePort
  selector:
    app: youremail-frontend
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
      protocol: TCP
