apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: youremail-frontend
  namespace: youremail
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: youremail-frontend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
