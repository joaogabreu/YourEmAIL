apiVersion: v1
kind: Service
metadata:
  name: youremail-gateway
  namespace: youremail
  labels:
    app: youremail-gateway
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: youremail-gateway
  namespace: youremail
subsets:
  - addresses:
      - ip: __GATEWAY_PRIVATE_IP__
    ports:
      - name: http
        port: 80
        protocol: TCP
